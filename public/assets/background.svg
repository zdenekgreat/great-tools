<svg width="1389" height="1479" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b0b0b0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b7355" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a0a0a0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9b8b6e" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="grad3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#b8b8b8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c9b896" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="radial1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9b896" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c9b896" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="radial2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b0b0b0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#b0b0b0" stop-opacity="0"/>
