    <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#b0a080" stroke-opacity="0.12" stroke-width="1"/>
  </pattern>
  <rect width="1389" height="1479" fill="url(#grid)"/>

  <!-- Large decorative lightbulb silhouette - top right -->
  <g opacity="0.15" transform="translate(950, 80) scale(1.8)">
    <path d="M120,20 C75,20 40,55 40,100 C40,130 55,155 78,170 C82,172 85,178 85,183 L85,200 C85,208 92,215 100,215 L140,215 C148,215 155,208 155,200 L155,183 C155,178 158,172 162,170 C185,155 200,130 200,100 C200,55 165,20 120,20 Z" fill="#9b8b6e"/>
    <rect x="95" y="215" width="50" height="8" rx="4" fill="#9b8b6e"/>
    <rect x="100" y="228" width="40" height="8" rx="4" fill="#9b8b6e"/>
    <rect x="105" y="241" width="30" height="8" rx="4" fill="#9b8b6e"/>
    <!-- Rays -->
    <line x1="120" y1="0" x2="120" y2="-20" stroke="#8b7355" stroke-width="3" stroke-linecap="round"/>
    <line x1="170" y1="10" x2="185" y2="-5" stroke="#8b7355" stroke-width="3" stroke-linecap="round"/>
    <line x1="70" y1="10" x2="55" y2="-5" stroke="#8b7355" stroke-width="3" stroke-linecap="round"/>
    <line x1="200" y1="60" x2="220" y2="55" stroke="#8b7355" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="60" x2="20" y2="55" stroke="#8b7355" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Hexagon cluster - top left -->
  <g opacity="0.2" transform="translate(80, 200)">
    <polygon points="30,0 60,17 60,52 30,69 0,52 0,17" fill="url(#grad1)" stroke="#9b8b6e" stroke-width="1.5" stroke-opacity="0.5"/>
    <polygon points="95,17 125,34 125,69 95,86 65,69 65,34" fill="url(#grad2)" stroke="#9b8b6e" stroke-width="1.5" stroke-opacity="0.4"/>
    <polygon points="30,69 60,86 60,121 30,138 0,121 0,86" fill="url(#grad3)" stroke="#9b8b6e" stroke-width="1.5" stroke-opacity="0.45"/>
  </g>

  <!-- Circuit-like connected dots - middle area -->
  <g opacity="0.2" stroke="#8b7355" stroke-width="1.5">
    <circle cx="300" cy="600" r="6" fill="#c9b896" fill-opacity="0.5"/>
    <circle cx="420" cy="550" r="5" fill="#c9b896" fill-opacity="0.5"/>
    <circle cx="380" cy="680" r="7" fill="#c9b896" fill-opacity="0.5"/>
    <circle cx="500" cy="620" r="4" fill="#c9b896" fill-opacity="0.5"/>
    <circle cx="460" cy="720" r="6" fill="#c9b896" fill-opacity="0.5"/>
    <line x1="300" y1="600" x2="420" y2="550" stroke-opacity="0.5"/>
    <line x1="420" y1="550" x2="500" y2="620" stroke-opacity="0.5"/>
    <line x1="300" y1="600" x2="380" y2="680" stroke-opacity="0.5"/>
    <line x1="380" y1="680" x2="460" y2="720" stroke-opacity="0.5"/>
    <line x1="500" y1="620" x2="460" y2="720" stroke-opacity="0.5"/>
  </g>

  <!-- Second circuit cluster - right side -->
  <g opacity="0.15" stroke="#9b8b6e" stroke-width="1.5">
    <circle cx="1050" cy="750" r="5" fill="#c9b896" fill-opacity="0.4"/>
    <circle cx="1150" cy="700" r="4" fill="#c9b896" fill-opacity="0.4"/>
    <circle cx="1100" cy="830" r="6" fill="#c9b896" fill-opacity="0.4"/>
    <circle cx="1200" cy="780" r="3.5" fill="#c9b896" fill-opacity="0.4"/>
    <line x1="1050" y1="750" x2="1150" y2="700" stroke-opacity="0.4"/>
    <line x1="1150" y1="700" x2="1200" y2="780" stroke-opacity="0.4"/>
    <line x1="1050" y1="750" x2="1100" y2="830" stroke-opacity="0.4"/>
    <line x1="1100" y1="830" x2="1200" y2="780" stroke-opacity="0.4"/>
  </g>

  <!-- Gear shape - bottom right -->
  <g opacity="0.15" transform="translate(1100, 1100) scale(1.5)">
    <path d="M50,15 L55,0 L65,0 L70,15 L85,10 L90,0 L98,5 L90,18 L100,30 L112,25 L115,34 L102,38 L105,55 L120,58 L118,68 L103,65 L98,80 L110,90 L103,97 L92,87 L78,98 L82,112 L72,115 L68,100 L52,102 L50,118 L40,117 L38,102 L22,98 L12,110 L5,103 L15,92 L5,78 L-8,82 L-12,72 L2,68 L0,52 L-15,50 L-13,40 L2,42 L8,27 L-5,18 L2,10 L15,20 L28,10 L25,0 L35,0 L38,15 Z" fill="url(#grad2)" stroke="#8b7355" stroke-width="1.5" stroke-opacity="0.35"/>
    <circle cx="53" cy="58" r="22" fill="none" stroke="#8b7355" stroke-width="2" stroke-opacity="0.3"/>
  </g>

  <!-- Abstract wave pattern - bottom -->
  <g opacity="0.18">
    <path d="M0,1300 Q200,1250 400,1300 Q600,1350 800,1300 Q1000,1250 1200,1300 Q1389,1350 1389,1300" fill="none" stroke="#9b8b6e" stroke-width="2.5" stroke-opacity="0.4"/>
    <path d="M0,1330 Q200,1280 400,1330 Q600,1380 800,1330 Q1000,1280 1200,1330 Q1389,1380 1389,1330" fill="none" stroke="#b0a080" stroke-width="2" stroke-opacity="0.3"/>
    <path d="M0,1360 Q200,1310 400,1360 Q600,1410 800,1360 Q1000,1310 1200,1360 Q1389,1410 1389,1360" fill="none" stroke="#c9b896" stroke-width="1.5" stroke-opacity="0.25"/>
  </g>

  <!-- Radial glow accents -->
  <circle cx="200" cy="900" r="200" fill="url(#radial1)"/>
  <circle cx="1200" cy="300" r="250" fill="url(#radial2)"/>
  <circle cx="700" cy="1200" r="180" fill="url(#radial1)"/>

  <!-- Diamond scatter -->
  <g opacity="0.2" fill="#b0a080">
    <rect x="650" y="150" width="14" height="14" rx="2" transform="rotate(45, 657, 157)"/>
    <rect x="900" y="800" width="12" height="12" rx="2" transform="rotate(45, 906, 806)"/>
    <rect x="150" y="1100" width="16" height="16" rx="2" transform="rotate(45, 158, 1108)"/>
    <rect x="1250" y="900" width="10" height="10" rx="1.5" transform="rotate(45, 1255, 905)"/>
    <rect x="500" y="400" width="12" height="12" rx="2" transform="rotate(45, 506, 406)"/>
    <rect x="750" y="950" width="11" height="11" rx="1.5" transform="rotate(45, 755, 955)"/>
    <rect x="350" y="300" width="9" height="9" rx="1.5" transform="rotate(45, 354, 304)"/>
    <rect x="1100" y="500" width="13" height="13" rx="2" transform="rotate(45, 1106, 506)"/>
  </g>

  <!-- Small lightbulb icon - bottom left -->
  <g opacity="0.12" transform="translate(100, 1050) scale(0.8)">
    <path d="M60,10 C37,10 20,28 20,50 C20,65 28,78 40,85 C42,86 44,90 44,93 L44,102 C44,106 48,110 52,110 L68,110 C72,110 76,106 76,102 L76,93 C76,90 78,86 80,85 C92,78 100,65 100,50 C100,28 83,10 60,10 Z" fill="#8b7355"/>
    <line x1="60" y1="0" x2="60" y2="-8" stroke="#9b8b6e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="85" y1="5" x2="90" y2="-2" stroke="#9b8b6e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="35" y1="5" x2="30" y2="-2" stroke="#9b8b6e" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Dotted arc decorations -->
  <g opacity="0.18" fill="none" stroke="#9b8b6e" stroke-width="2" stroke-dasharray="5,10">
    <path d="M1000,100 A200,200 0 0,1 1200,300"/>
    <path d="M100,700 A150,150 0 0,0 250,850"/>
    <path d="M800,1100 A180,180 0 0,1 980,1280"/>
  </g>

  <!-- Additional hexagon - middle right -->
  <g opacity="0.12" transform="translate(1000, 600)">
    <polygon points="40,0 80,23 80,69 40,92 0,69 0,23" fill="none" stroke="#9b8b6e" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>

  <!-- Floating circles -->
  <g opacity="0.12">
    <circle cx="600" cy="250" r="35" fill="none" stroke="#b0a080" stroke-width="1.5"/>
    <circle cx="600" cy="250" r="25" fill="none" stroke="#c9b896" stroke-width="1" stroke-dasharray="3,5"/>
    <circle cx="1300" cy="1050" r="45" fill="none" stroke="#9b8b6e" stroke-width="1.5"/>
    <circle cx="1300" cy="1050" r="32" fill="none" stroke="#b0a080" stroke-width="1" stroke-dasharray="3,5"/>
  </g>
</svg>
