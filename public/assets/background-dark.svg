<svg width="1389" height="1479" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9b896" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8b7355" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="dg2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4c5a0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#9b8b6e" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="dg3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#e0d5b8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9b896" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="dr1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9b896" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c9b896" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dr2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a09080" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#a09080" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Subtle grid -->
  <pattern id="dgrid" width="80" height="80" patternUnits="userSpaceOnUse">
    <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#c9b896" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <rect width="1389" height="1479" fill="url(#dgrid)"/>

  <!-- Large lightbulb silhouette - top right -->
  <g opacity="0.05" transform="translate(950, 80) scale(1.8)">
    <path d="M120,20 C75,20 40,55 40,100 C40,130 55,155 78,170 C82,172 85,178 85,183 L85,200 C85,208 92,215 100,215 L140,215 C148,215 155,208 155,200 L155,183 C155,178 158,172 162,170 C185,155 200,130 200,100 C200,55 165,20 120,20 Z" fill="#d4c5a0"/>
    <rect x="95" y="215" width="50" height="8" rx="4" fill="#d4c5a0"/>
    <rect x="100" y="228" width="40" height="8" rx="4" fill="#d4c5a0"/>
    <rect x="105" y="241" width="30" height="8" rx="4" fill="#d4c5a0"/>
    <line x1="120" y1="0" x2="120" y2="-20" stroke="#e0d5b8" stroke-width="3" stroke-linecap="round"/>
    <line x1="170" y1="10" x2="185" y2="-5" stroke="#e0d5b8" stroke-width="3" stroke-linecap="round"/>
    <line x1="70" y1="10" x2="55" y2="-5" stroke="#e0d5b8" stroke-width="3" stroke-linecap="round"/>
    <line x1="200" y1="60" x2="220" y2="55" stroke="#e0d5b8" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="60" x2="20" y2="55" stroke="#e0d5b8" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Hexagon cluster - top left -->
  <g opacity="0.07" transform="translate(80, 200)">
    <polygon points="30,0 60,17 60,52 30,69 0,52 0,17" fill="url(#dg1)" stroke="#c9b896" stroke-width="1" stroke-opacity="0.2"/>
    <polygon points="95,17 125,34 125,69 95,86 65,69 65,34" fill="url(#dg2)" stroke="#c9b896" stroke-width="1" stroke-opacity="0.15"/>
    <polygon points="30,69 60,86 60,121 30,138 0,121 0,86" fill="url(#dg3)" stroke="#c9b896" stroke-width="1" stroke-opacity="0.18"/>
  </g>

  <!-- Circuit dots -->
  <g opacity="0.07" stroke="#d4c5a0" stroke-width="1.5">
    <circle cx="300" cy="600" r="5" fill="#c9b896" fill-opacity="0.2"/>
    <circle cx="420" cy="550" r="4" fill="#c9b896" fill-opacity="0.2"/>
    <circle cx="380" cy="680" r="6" fill="#c9b896" fill-opacity="0.2"/>
    <circle cx="500" cy="620" r="3" fill="#c9b896" fill-opacity="0.2"/>
    <circle cx="460" cy="720" r="5" fill="#c9b896" fill-opacity="0.2"/>
    <line x1="300" y1="600" x2="420" y2="550" stroke-opacity="0.2"/>
    <line x1="420" y1="550" x2="500" y2="620" stroke-opacity="0.2"/>
    <line x1="300" y1="600" x2="380" y2="680" stroke-opacity="0.2"/>
    <line x1="380" y1="680" x2="460" y2="720" stroke-opacity="0.2"/>
    <line x1="500" y1="620" x2="460" y2="720" stroke-opacity="0.2"/>
  </g>

  <!-- Gear - bottom right -->
  <g opacity="0.05" transform="translate(1100, 1100) scale(1.5)">
    <path d="M50,15 L55,0 L65,0 L70,15 L85,10 L90,0 L98,5 L90,18 L100,30 L112,25 L115,34 L102,38 L105,55 L120,58 L118,68 L103,65 L98,80 L110,90 L103,97 L92,87 L78,98 L82,112 L72,115 L68,100 L52,102 L50,118 L40,117 L38,102 L22,98 L12,110 L5,103 L15,92 L5,78 L-8,82 L-12,72 L2,68 L0,52 L-15,50 L-13,40 L2,42 L8,27 L-5,18 L2,10 L15,20 L28,10 L25,0 L35,0 L38,15 Z" fill="url(#dg2)" stroke="#c9b896" stroke-width="1" stroke-opacity="0.15"/>
    <circle cx="53" cy="58" r="22" fill="none" stroke="#c9b896" stroke-width="1.5" stroke-opacity="0.12"/>
  </g>

  <!-- Waves -->
  <g opacity="0.06">
    <path d="M0,1300 Q200,1250 400,1300 Q600,1350 800,1300 Q1000,1250 1200,1300 Q1389,1350 1389,1300" fill="none" stroke="url(#dg1)" stroke-width="2"/>
    <path d="M0,1330 Q200,1280 400,1330 Q600,1380 800,1330 Q1000,1280 1200,1330 Q1389,1380 1389,1330" fill="none" stroke="url(#dg2)" stroke-width="1.5"/>
    <path d="M0,1360 Q200,1310 400,1360 Q600,1410 800,1360 Q1000,1310 1200,1360 Q1389,1410 1389,1360" fill="none" stroke="url(#dg3)" stroke-width="1"/>
  </g>

  <!-- Radial glows -->
  <circle cx="200" cy="900" r="200" fill="url(#dr1)"/>
  <circle cx="1200" cy="300" r="250" fill="url(#dr2)"/>
  <circle cx="700" cy="1200" r="180" fill="url(#dr1)"/>

  <!-- Diamonds -->
  <g opacity="0.07" fill="#d4c5a0">
    <rect x="650" y="150" width="12" height="12" rx="2" transform="rotate(45, 656, 156)"/>
    <rect x="900" y="800" width="10" height="10" rx="1.5" transform="rotate(45, 905, 805)"/>
    <rect x="150" y="1100" width="14" height="14" rx="2" transform="rotate(45, 157, 1107)"/>
    <rect x="1250" y="900" width="8" height="8" rx="1" transform="rotate(45, 1254, 904)"/>
    <rect x="500" y="400" width="10" height="10" rx="1.5" transform="rotate(45, 505, 405)"/>
  </g>

  <!-- Small lightbulb - bottom left -->
  <g opacity="0.045" transform="translate(100, 1050) scale(0.8)">
    <path d="M60,10 C37,10 20,28 20,50 C20,65 28,78 40,85 C42,86 44,90 44,93 L44,102 C44,106 48,110 52,110 L68,110 C72,110 76,106 76,102 L76,93 C76,90 78,86 80,85 C92,78 100,65 100,50 C100,28 83,10 60,10 Z" fill="#d4c5a0"/>
    <line x1="60" y1="0" x2="60" y2="-8" stroke="#e0d5b8" stroke-width="2" stroke-linecap="round"/>
    <line x1="85" y1="5" x2="90" y2="-2" stroke="#e0d5b8" stroke-width="2" stroke-linecap="round"/>
    <line x1="35" y1="5" x2="30" y2="-2" stroke="#e0d5b8" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Dotted arcs -->
  <g opacity="0.06" fill="none" stroke="#c9b896" stroke-width="1.5" stroke-dasharray="4,8">
    <path d="M1000,100 A200,200 0 0,1 1200,300"/>
    <path d="M100,700 A150,150 0 0,0 250,850"/>
    <path d="M800,1100 A180,180 0 0,1 980,1280"/>
  </g>
</svg>
